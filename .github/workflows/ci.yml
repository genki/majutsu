name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: format確認
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
      - name: test実行
        run: RUST_TEST_THREADS=1 cargo test --workspace --all-targets --locked -- --nocapture
      - name: local file-remote E2E
        run: RUST_TEST_THREADS=1 cargo test --test e2e_local --locked -- --nocapture
      - name: package smoke test
        run: scripts/package-release.sh smoke
      - name: package artifact upload
        uses: actions/upload-artifact@v4
        with:
          name: majutsu-${{ matrix.os }}
          path: dist/*
          if-no-files-found: error

  minio-e2e:
    name: S3互換 MinIO E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: docker compose確認
        run: docker compose version
      - name: MinIO E2E実行
        run: scripts/e2e-minio.sh
